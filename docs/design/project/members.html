<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pixela — Участники</title>
<link rel="stylesheet" href="styles.css">
<style>
  html,body{ height:100%; overflow:hidden; }
  .shell{ height:100vh; display:flex; background:var(--bg); }

  /* org sidebar (same as projects.html) */
  .side{ width:228px; flex:0 0 228px; border-right:1px solid var(--border); background:var(--surface-1); display:flex; flex-direction:column; }
  .side .brand{ height:52px; display:flex; align-items:center; gap:9px; padding:0 16px; border-bottom:1px solid var(--border); }
  .logo{ width:22px; height:22px; border-radius:6px; background:var(--accent); display:flex; align-items:center; justify-content:center; } .logo svg{ width:14px; height:14px; color:var(--accent-fg); }
  .brand .name{ font-weight:600; font-size:15px; letter-spacing:-.01em; }
  .orgsel{ margin:12px 12px 6px; padding:9px 11px; border-radius:8px; background:var(--surface-2); border:1px solid var(--border); display:flex; align-items:center; gap:10px; cursor:pointer; } .orgsel:hover{ background:var(--surface-3); }
  .orgsel .av{ width:24px; height:24px; border-radius:6px; background:linear-gradient(135deg,#6E8AFA,#9d7bf0); flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; }
  .orgsel .t{ flex:1; min-width:0; } .orgsel .t .o{ font-size:13px; font-weight:600; } .orgsel .t .p{ font-size:11px; color:var(--text-3); }
  .orgsel .ch{ color:var(--text-3); } .orgsel .ch svg{ width:14px; height:14px; }
  .nav{ padding:8px 12px; display:flex; flex-direction:column; gap:2px; }
  .nav .lbl{ font-size:10.5px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-3); padding:10px 10px 6px; }
  .nav a{ display:flex; align-items:center; gap:11px; height:34px; padding:0 10px; border-radius:7px; color:var(--text-2); font-size:13px; font-weight:500; text-decoration:none; }
  .nav a svg{ width:16px; height:16px; } .nav a .ct{ margin-left:auto; font-size:11px; font-family:var(--mono); color:var(--text-3); background:var(--surface-2); border-radius:5px; padding:1px 6px; }
  .nav a:hover{ background:var(--surface-2); color:var(--text-1); text-decoration:none; }
  .nav a.active{ background:var(--accent-bg); color:var(--accent-2); } .nav a.active .ct{ color:var(--accent-2); background:rgba(110,138,250,0.16); }
  .side .foot{ margin-top:auto; padding:10px 12px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .side .foot .ava{ width:28px; height:28px; border-radius:50%; background:#5b6ee0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#fff; }
  .side .foot .un{ font-size:13px; font-weight:550; } .side .foot .ue{ font-size:11px; color:var(--text-3); }
  .side .foot .cog{ margin-left:auto; color:var(--text-3); cursor:pointer; } .side .foot .cog svg{ width:16px; height:16px; }

  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar{ height:58px; flex:0 0 58px; display:flex; align-items:center; gap:14px; padding:0 26px; border-bottom:1px solid var(--border); }
  .topbar h1{ margin:0; font-size:18px; font-weight:600; letter-spacing:-.01em; } .topbar .spacer{ flex:1; }
  .search{ display:flex; align-items:center; gap:8px; height:34px; padding:0 12px; border-radius:8px; background:var(--surface-inset); border:1px solid var(--border); width:220px; color:var(--text-3); font-size:13px; } .search svg{ width:15px; height:15px; }
  .body{ flex:1; overflow:auto; padding:22px 26px 44px; }

  .summary{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
  .scard{ border:1px solid var(--border); border-radius:12px; background:var(--surface-1); padding:15px 17px; }
  .scard .lab{ font-size:11.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:.04em; display:flex; align-items:center; gap:7px; margin-bottom:10px; } .scard .lab svg{ width:14px; height:14px; }
  .scard .num{ font-family:var(--mono); font-size:25px; font-weight:600; letter-spacing:-.02em; } .scard .sub{ font-size:11.5px; color:var(--text-3); margin-top:4px; }
  .scard.green .num{ color:var(--ok); }

  .secrow{ display:flex; align-items:center; justify-content:space-between; margin:4px 0 6px; }
  .secrow h2{ margin:0; font-size:14px; font-weight:600; } .secrow .filters{ display:flex; gap:8px; }
  .fbtn{ display:flex; align-items:center; gap:7px; height:32px; padding:0 11px; border-radius:7px; background:var(--surface-2); border:1px solid var(--border); color:var(--text-2); font-size:12.5px; font-weight:500; cursor:pointer; } .fbtn:hover{ background:var(--surface-3); color:var(--text-1); } .fbtn svg{ width:14px; height:14px; }

  table{ width:100%; border-collapse:collapse; margin-top:12px; }
  thead th{ text-align:left; font-size:11px; font-weight:600; letter-spacing:.05em; text-transform:uppercase; color:var(--text-3); padding:0 14px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
  thead th.num, tbody td.num{ text-align:right; font-variant-numeric:tabular-nums; }
  tbody td{ padding:13px 14px; border-bottom:1px solid var(--border-faint); font-size:13px; vertical-align:middle; }
  tbody tr{ cursor:pointer; } tbody tr:hover{ background:var(--surface-1); }
  .mcell{ display:flex; align-items:center; gap:11px; }
  .mcell .ava{ width:32px; height:32px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:#fff; }
  .mcell .nm{ font-weight:550; color:var(--text-1); } .mcell .em{ font-size:11.5px; color:var(--text-3); }
  .role{ display:inline-flex; align-items:center; gap:6px; height:23px; padding:0 9px; border-radius:6px; font-size:12px; font-weight:550; border:1px solid transparent; }
  .role svg{ width:12px; height:12px; }
  .role.admin{ color:var(--accent-2); background:var(--accent-bg); border-color:rgba(110,138,250,.28); }
  .role.reviewer{ color:var(--ok); background:var(--ok-bg); border-color:rgba(79,181,138,.28); }
  .role.dev{ color:var(--new); background:var(--new-bg); border-color:rgba(86,168,214,.28); }
  .role.viewer{ color:var(--text-2); background:var(--neutral-bg); border-color:var(--border); }
  .projs{ display:flex; gap:5px; flex-wrap:nowrap; }
  .ptag{ font-size:11px; font-family:var(--mono); color:var(--text-2); background:var(--surface-2); border:1px solid var(--border-faint); border-radius:5px; padding:1px 6px; }
  .ptag.more{ color:var(--text-3); }
  .num b{ font-family:var(--mono); font-weight:600; font-size:14px; }
  .apr{ display:inline-flex; align-items:center; gap:8px; justify-content:flex-end; }
  .aprbar{ width:54px; height:5px; border-radius:3px; background:var(--surface-3); overflow:hidden; } .aprbar i{ display:block; height:100%; background:var(--ok); border-radius:3px; }
  .spark{ display:inline-flex; align-items:flex-end; gap:2px; height:24px; } .spark i{ width:4px; border-radius:1.5px 1.5px 0 0; background:var(--accent); opacity:.55; }
  .last{ color:var(--text-2); font-family:var(--mono); font-size:12px; white-space:nowrap; } .last.now{ color:var(--ok); }
  .dotnow{ width:7px; height:7px; border-radius:50%; background:var(--ok); display:inline-block; margin-right:6px; }
</style>
</head>
<body>
<div class="shell">
  <aside class="side" id="orgside"></aside>

  <main class="main">
    <div class="topbar">
      <h1>Участники</h1>
      <div class="spacer"></div>
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg> Найти участника…</div>
      <button class="btn btn--primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/></svg> Пригласить</button>
    </div>

    <div class="body">
      <div class="summary">
        <div class="scard"><div class="lab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.2"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M16 5.5a3 3 0 0 1 0 5.4M21 20a6 6 0 0 0-4-5.6"/></svg>Участников</div><div class="num">8</div><div class="sub">3 ревьюера · 1 админ</div></div>
        <div class="scard"><div class="lab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>Проверок за неделю</div><div class="num">142</div><div class="sub">+18% к прошлой</div></div>
        <div class="scard"><div class="lab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Среднее время ответа</div><div class="num">3.2<span style="font-size:15px">ч</span></div><div class="sub">от прогона до решения</div></div>
        <div class="scard green"><div class="lab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg>Доля одобрений</div><div class="num">94<span style="font-size:15px">%</span></div><div class="sub">6% отклонено</div></div>
      </div>

      <div class="secrow">
        <h2>Команда Acme Inc</h2>
        <div class="filters">
          <button class="fbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg> Все роли</button>
          <button class="fbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg> За 7 дней</button>
        </div>
      </div>

      <table>
        <thead><tr>
          <th>Участник</th><th>Роль</th><th>Доступ к проектам</th>
          <th class="num">Проверок</th><th class="num">Одобрено</th><th>Активность</th><th>Последняя активность</th>
        </tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="org-shell.js"></script>
<script>
  renderOrgSide('members');
  const ROLES = {
    admin:['admin','Админ','<path d="M12 2 4 6v6c0 5 3.4 8.5 8 10 4.6-1.5 8-5 8-10V6z"/>'],
    reviewer:['reviewer','Ревьюер','<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'],
    dev:['dev','Разработчик','<path d="m8 9-4 3 4 3M16 9l4 3-4 3M13 6l-2 12"/>'],
    viewer:['viewer','Наблюдатель','<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>'],
  };
  const members = [
    {n:'Мира Кан', e:'mira@acme.dev', i:'МК', c:'#5b6ee0', role:'admin', projects:['storefront','design-system','admin-dashboard','marketing-site','docs'], reviews:38, apr:96, last:'сейчас', now:true,
     act:[5,7,4,8,6,9,7]},
    {n:'Тео Реймс', e:'theo@acme.dev', i:'ТР', c:'#c2683a', role:'reviewer', projects:['storefront','admin-dashboard'], reviews:31, apr:90, last:'12 мин',
     act:[4,6,8,5,7,6,9]},
    {n:'Ари Лунд', e:'ari@acme.dev', i:'АЛ', c:'#3a8f6b', role:'reviewer', projects:['marketing-site','docs','mobile-web'], reviews:27, apr:93, last:'40 мин',
     act:[6,5,7,4,8,5,6]},
    {n:'Jordan Avery', e:'jordan@acme.dev', i:'JA', c:'#7a5bd0', role:'dev', projects:['storefront','mobile-web'], reviews:22, apr:88, last:'2 ч',
     act:[3,5,4,6,5,7,4]},
    {n:'Нина Сато', e:'nina@acme.dev', i:'НС', c:'#3a8f6b', role:'reviewer', projects:['design-system'], reviews:14, apr:97, last:'3 ч',
     act:[2,4,3,5,4,3,5]},
    {n:'Лео Маркс', e:'leo@acme.dev', i:'ЛМ', c:'#c25b8f', role:'dev', projects:['admin-dashboard'], reviews:7, apr:85, last:'1 дн',
     act:[1,2,1,3,2,1,2]},
    {n:'Ивона Краль', e:'iwona@acme.dev', i:'ИК', c:'#5b9ed0', role:'viewer', projects:['storefront','docs'], reviews:0, apr:0, last:'4 дн',
     act:[0,0,0,0,0,0,0]},
    {n:'CI bot', e:'ci@acme.dev', i:'CI', c:'#3a3a44', role:'viewer', projects:['все'], reviews:0, apr:0, last:'сейчас', now:true,
     act:[0,0,0,0,0,0,0]},
  ];
  const maxAct = 9;
  document.getElementById('rows').innerHTML = members.map(m=>{
    const r = ROLES[m.role];
    const shown = m.projects.slice(0,2);
    const extra = m.projects.length - shown.length;
    const projs = shown.map(p=>`<span class="ptag">${p}</span>`).join('') + (extra>0?`<span class="ptag more">+${extra}</span>`:'');
    const spark = m.act.map(v=>`<i style="height:${Math.max(2,v/maxAct*24)}px"></i>`).join('');
    const aprCell = m.reviews? `<span class="apr"><span class="aprbar"><i style="width:${m.apr}%"></i></span><b style="font-family:var(--mono)">${m.apr}%</b></span>` : '<span style="color:var(--text-3)">—</span>';
    return `<tr>
      <td><div class="mcell"><span class="ava" style="background:${m.c}">${m.i}</span><div><div class="nm">${m.n}</div><div class="em">${m.e}</div></div></div></td>
      <td><span class="role ${r[0]}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${r[2]}</svg>${r[1]}</span></td>
      <td><div class="projs">${projs}</div></td>
      <td class="num">${m.reviews?`<b>${m.reviews}</b>`:'<span style="color:var(--text-3)">0</span>'}</td>
      <td class="num">${aprCell}</td>
      <td><span class="spark">${spark}</span></td>
      <td><span class="last ${m.now?'now':''}">${m.now?'<span class="dotnow"></span>':''}${m.last}</span></td>
    </tr>`;
  }).join('');
</script>
</body>
</html>
