<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pixela — Очередь проверок</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="ds-components.css">
<link rel="stylesheet" href="app-shell.css">
<style>
  html,body{ height:100%; overflow:hidden; }
  .intro{ display:flex; align-items:center; gap:12px; padding:13px 16px; margin-bottom:20px; border-radius:11px;
    background:var(--accent-bg); border:1px solid rgba(110,138,250,.22); }
  .intro svg{ width:18px; height:18px; color:var(--accent-2); flex:0 0 auto; }
  .intro .t{ font-size:13px; color:var(--text-1); } .intro .t b{ color:var(--accent-2); }

  .group{ border:1px solid var(--border); border-radius:13px; background:var(--surface-1); margin-bottom:16px; overflow:hidden; }
  .group .gh{ display:flex; align-items:center; gap:14px; padding:15px 18px; }
  .group .gtype{ width:38px; height:38px; border-radius:10px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; }
  .group .gtype svg{ width:19px; height:19px; }
  .gtype--changed{ background:var(--changed-bg); color:var(--changed); } .gtype--new{ background:var(--new-bg); color:var(--new); } .gtype--removed{ background:var(--removed-bg); color:var(--removed); }
  .group .gi{ flex:1; min-width:0; }
  .group .gi .gt{ font-size:14.5px; font-weight:600; letter-spacing:-.01em; }
  .group .gi .gm{ font-size:12.5px; color:var(--text-2); margin-top:3px; display:flex; align-items:center; gap:9px; flex-wrap:wrap; }
  .group .gm .dot{ color:var(--text-3); }
  .countpill{ display:inline-flex; align-items:center; gap:6px; height:24px; padding:0 10px; border-radius:999px; font-size:12px; font-weight:600;
    color:var(--text-1); background:var(--surface-2); border:1px solid var(--border); white-space:nowrap; }
  .countpill svg{ width:13px; height:13px; color:var(--text-3); }
  .gactions{ display:flex; align-items:center; gap:8px; flex:0 0 auto; }

  .gbody{ display:flex; gap:18px; padding:0 18px 16px; }
  .repr{ flex:0 0 auto; display:flex; gap:2px; border:1px solid var(--border-strong); border-radius:9px; overflow:hidden; background:#0b0b0d; }
  .repr .side2{ position:relative; width:150px; height:118px; overflow:hidden; }
  .repr .side2 img{ position:absolute; top:0; left:0; width:100%; }
  .repr .side2 .lab{ position:absolute; top:6px; left:6px; z-index:2; font-size:9.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:2px 6px; border-radius:4px; background:rgba(0,0,0,.6); backdrop-filter:blur(3px); }
  .repr .side2 .diffov{ position:absolute; top:0; left:0; width:100%; opacity:.85; }
  .repr .side2 .lab.new{ color:var(--changed); }
  .affected{ flex:1; min-width:0; }
  .affected .al{ font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--text-3); margin-bottom:9px; }
  .thumbs{ display:flex; flex-wrap:wrap; gap:8px; }
  .tmb{ width:74px; }
  .tmb .ti{ width:74px; height:56px; border-radius:7px; overflow:hidden; border:1px solid var(--border); background:#0b0b0d; position:relative; }
  .tmb .ti img{ position:absolute; top:0; left:0; width:100%; }
  .tmb .ti .ov{ position:absolute; top:0; left:0; width:100%; opacity:.8; }
  .tmb .tn{ font-size:10px; color:var(--text-3); font-family:var(--mono); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tmb.more{ display:flex; align-items:center; justify-content:center; height:56px; border:1px dashed var(--border-strong); border-radius:7px; color:var(--text-3); font-size:12px; font-family:var(--mono); }

  .hidden{ display:none; }
  .indiv h2{ font-size:13px; font-weight:600; margin:26px 0 12px; }
</style>
</head>
<body>
<div class="shell">
  <aside class="side" id="projside"></aside>
  <main class="main">
    <div class="topbar">
      <div class="htitle"><h1>Очередь проверок</h1><span class="sub">Storefront · ветка feat/checkout-redesign</span></div>
      <div class="spacer"></div>
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg> Поиск по снимку…</div>
      <button class="btn btn--ok"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg> Принять все группы</button>
    </div>

    <div class="body">
      <div class="intro">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8"/></svg>
        <div class="t"><b>23 изменения объединены в 5 групп.</b> Одинаковые правки затронули много снимков — примите изменение один раз, и оно применится ко всей группе.</div>
      </div>
      <div id="groups"></div>

      <div class="indiv" id="indiv"></div>
    </div>
  </main>
</div>

<script src="project-shell.js"></script>
<script>
  renderProjSide('queue');
  const BASE='assets/baseline.png', NEW='assets/new.png', DIFF='assets/diff.png';

  const groups = [
    {type:'changed', title:'Промокод добавлен в блок «Order summary»', range:'3.4–5.1%', count:6,
      tests:['checkout-mobile','checkout-desktop','pricing-table','modal-confirm','product-card','toast-success'],
      cause:'Высота снимка выросла на 60px из-за новой строки кода скидки.'},
    {type:'changed', title:'Кнопка «Pay now»: indigo → green', range:'0.9–2.0%', count:8,
      tests:['checkout-mobile','checkout-desktop','cart-summary','express-pay','apple-pay','gpay','one-click','subscribe'],
      cause:'Изменён токен --btn-primary в дизайн-системе.'},
    {type:'new', title:'Новый блок поддержки в футере', range:'нов.', count:3,
      tests:['footer-links','contact-page','help-widget'],
      cause:'Добавлен новый компонент SupportStrip.'},
  ];
  const individual = [
    {type:'removed', title:'search-overlay удалён', sub:'компонент GlobalSearch убран из шапки', test:'search-overlay'},
    {type:'changed', title:'nav-header · сдвиг логотипа на 3px', sub:'возможная регрессия — помечен как нестабильный', test:'nav-header', diff:'0.4%'},
  ];

  const typeIcon = {
    changed:'<path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>',
    new:'<path d="M12 5v14M5 12h14"/>',
    removed:'<path d="M5 12h14"/>',
  };
  const typeLabel = { changed:'Изменено', new:'Новый', removed:'Удалён' };

  function thumb(name, type){
    const img = type==='new' ? NEW : BASE;
    const ov = type==='changed' ? `<img class="ov" src="${DIFF}">` : '';
    return `<div class="tmb"><div class="ti"><img src="${img}">${ov}</div><div class="tn">${name}</div></div>`;
  }

  document.getElementById('groups').innerHTML = groups.map((g,gi)=>{
    const visible = g.tests.slice(0,5);
    const extra = g.count - visible.length;
    const thumbs = visible.map(t=>thumb(t,g.type)).join('') + (extra>0?`<div class="tmb"><div class="more">+${extra}</div></div>`:'');
    const reprNew = g.type==='new';
    return `<div class="group">
      <div class="gh">
        <span class="gtype gtype--${g.type}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">${typeIcon[g.type]}</svg></span>
        <div class="gi">
          <div class="gt">${g.title}</div>
          <div class="gm"><span>${g.cause}</span><span class="dot">·</span><span class="mono">${g.range}</span></div>
        </div>
        <span class="countpill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>${g.count} снимков</span>
        <div class="gactions">
          <button class="btn btn--danger" style="height:30px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg> Отклонить</button>
          <button class="btn btn--ok" style="height:30px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg> Принять группу</button>
        </div>
      </div>
      <div class="gbody">
        <div class="repr">
          <div class="side2"><span class="lab" style="background:rgba(0,0,0,.6)">Эталон</span><img src="${BASE}"></div>
          <div class="side2"><span class="lab new">Новый</span><img src="${reprNew?NEW:NEW}">${g.type==='changed'?`<img class="diffov" src="${DIFF}">`:''}</div>
        </div>
        <div class="affected">
          <div class="al">Затронутые снимки · ${g.count}</div>
          <div class="thumbs">${thumbs}</div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('indiv').innerHTML = '<h2>Отдельные изменения</h2>' + individual.map(g=>`
    <div class="group"><div class="gh">
      <span class="gtype gtype--${g.type}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">${typeIcon[g.type]}</svg></span>
      <div class="gi"><div class="gt">${g.title}</div><div class="gm"><span>${g.sub}</span>${g.diff?`<span class="dot">·</span><span class="mono">${g.diff}</span>`:''}</div></div>
      <span class="status status--${g.type}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">${typeIcon[g.type]}</svg> ${typeLabel[g.type]}</span>
      <div class="gactions">
        <button class="iconbtn" title="Отклонить"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
        <button class="iconbtn" title="Открыть сравнение" onclick="location.href='review.html'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
        <button class="btn btn--ok" style="height:30px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg> Принять</button>
      </div>
    </div></div>`).join('');
</script>
</body>
</html>
