<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pixela — Активность</title>
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="ds-components.css">
<link rel="stylesheet" href="app-shell.css">
<style>
  html,body{ height:100%; overflow:hidden; }
  .feedwrap{ max-width:820px; }
  .filters{ display:flex; align-items:center; gap:9px; margin-bottom:22px; flex-wrap:wrap; }
  .filters .spacer{ flex:1; }

  .daygroup{ margin-bottom:8px; }
  .daylbl{ font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-3); padding:8px 0 14px; position:sticky; top:0; background:var(--bg); z-index:2; }
  .feed{ position:relative; padding-left:6px; }
  .feed::before{ content:""; position:absolute; left:17px; top:4px; bottom:4px; width:2px; background:var(--border); }
  .ev{ display:flex; gap:15px; padding-bottom:18px; position:relative; }
  .ev .marker{ width:24px; height:24px; border-radius:50%; flex:0 0 24px; display:flex; align-items:center; justify-content:center; z-index:1; border:2px solid var(--bg); }
  .ev .marker svg{ width:13px; height:13px; }
  .m-approved{ background:var(--ok-bg); color:var(--ok); } .m-rejected{ background:var(--removed-bg); color:var(--removed); }
  .m-baseline{ background:var(--accent-bg); color:var(--accent-2); } .m-failed{ background:var(--removed-bg); color:var(--removed); }
  .m-flaky{ background:var(--changed-bg); color:var(--changed); } .m-member{ background:var(--new-bg); color:var(--new); }
  .m-comment{ background:var(--surface-3); color:var(--text-2); } .m-settings{ background:var(--surface-3); color:var(--text-2); }
  .ev .ec{ flex:1; min-width:0; padding-top:2px; }
  .ev .erow{ display:flex; align-items:baseline; gap:8px; }
  .ev .txt{ font-size:13.5px; color:var(--text-1); line-height:1.5; }
  .ev .txt b{ font-weight:600; } .ev .txt .who{ font-weight:600; }
  .ev .when{ margin-left:auto; font-size:11.5px; color:var(--text-3); font-family:var(--mono); white-space:nowrap; flex:0 0 auto; }
  .ev .meta2{ display:flex; align-items:center; gap:8px; margin-top:6px; flex-wrap:wrap; }
  .ptag{ display:inline-flex; align-items:center; gap:6px; font-size:11.5px; font-family:var(--mono); color:var(--text-2); background:var(--surface-2); border:1px solid var(--border-faint); border-radius:6px; padding:2px 8px; }
  .ptag .sq{ width:11px; height:11px; border-radius:3px; flex:0 0 auto; }
  .snaptag{ font-family:var(--mono); font-size:11.5px; color:var(--text-3); }
  .ava-in{ width:18px; height:18px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:#fff; vertical-align:-4px; margin-right:2px; }
  .cmt{ margin-top:8px; padding:9px 12px; border-radius:8px; border:1px solid var(--border); background:var(--surface-inset); font-size:12.5px; color:var(--text-2); line-height:1.5; }
</style>
</head>
<body>
<div class="shell">
  <aside class="side" id="orgside"></aside>
  <main class="main">
    <div class="topbar">
      <div class="htitle"><h1>Активность</h1><span class="sub">Все события организации Acme Inc</span></div>
      <div class="spacer"></div>
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg> Поиск по событиям…</div>
    </div>
    <div class="body">
      <div class="feedwrap">
        <div class="filters">
          <button class="fbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg> Все проекты <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
          <button class="fbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg> Все типы <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
          <button class="fbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="8" r="3.2"/><path d="M3 20a6 6 0 0 1 12 0"/></svg> Все участники <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></button>
          <div class="spacer"></div>
          <button class="fbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.2-8.5"/><path d="M21 3v6h-6"/></svg> Обновить</button>
        </div>
        <div id="feed"></div>
      </div>
    </div>
  </main>
</div>

<script src="org-shell.js"></script>
<script>
  renderOrgSide('activity');
  const proj = {
    storefront:['storefront','#6E8AFA'], 'admin-dashboard':['admin-dashboard','#56A8D6'],
    'design-system':['design-system','#9d7bf0'], 'marketing-site':['marketing-site','#4FB58A'],
    'mobile-web':['mobile-web','#E0A53E'], docs:['docs','#5b6ee0'],
  };
  const ic = {
    approved:'<path d="M20 6 9 17l-5-5"/>', rejected:'<path d="M18 6 6 18M6 6l12 12"/>',
    baseline:'<rect x="3" y="3" width="18" height="18" rx="2"/><path d="m7.5 12 3 3 6-7"/>',
    failed:'<path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>',
    flaky:'<path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/>', member:'<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6M22 11h-6"/>',
    comment:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>', settings:'<circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82M4.6 9a1.65 1.65 0 0 0-.33-1.82"/>',
  };
  function av(i,c){ return `<span class="ava-in" style="background:${c}">${i}</span>`; }
  function ptag(p){ const x=proj[p]; return `<span class="ptag"><span class="sq" style="background:${x[1]}"></span>${x[0]}</span>`; }

  const days = [
    ['Сегодня', [
      {t:'approved', who:['Мира Кан','МК','#5b6ee0'], action:'приняла группу из <b>6 снимков</b>', snap:'промокод в Order summary', p:'storefront', when:'12 мин'},
      {t:'baseline', who:['Мира Кан','МК','#5b6ee0'], action:'обновила базовую линию', snap:'checkout-mobile', p:'storefront', when:'12 мин'},
      {t:'failed', who:['CI bot','CI','#3a3a44'], action:'сборка <b>chore/deps-bump</b> завершилась с ошибкой', snap:'таймаут рендера WebKit', p:'admin-dashboard', when:'48 мин'},
      {t:'flaky', who:['CI bot','CI','#3a3a44'], action:'тест помечен <b>нестабильным</b>', snap:'applies promo code', p:'storefront', when:'1 ч'},
      {t:'rejected', who:['Тео Реймс','ТР','#c2683a'], action:'отклонил изменение', snap:'pricing-table · сдвиг иконки', p:'design-system', when:'2 ч', cmt:'Это регрессия — иконка плана съехала на 2px. Нужно чинить в коде, не принимаем.'},
    ]],
    ['Вчера', [
      {t:'approved', who:['Ари Лунд','АЛ','#3a8f6b'], action:'приняла <b>8 снимков</b> (кнопка Pay now)', snap:'green primary', p:'storefront', when:'18:40'},
      {t:'member', who:['Мира Кан','МК','#5b6ee0'], action:'пригласила <span class="who">Нину Сато</span> с ролью Ревьюер', p:'—', when:'15:02'},
      {t:'settings', who:['Мира Кан','МК','#5b6ee0'], action:'изменила порог различий <b>0.30 → 0.20</b>', p:'design-system', when:'11:18'},
      {t:'baseline', who:['CI bot','CI','#3a3a44'], action:'зафиксировала 184 базовых снимка', snap:'первичный прогон', p:'marketing-site', when:'09:30'},
    ]],
    ['28 мая', [
      {t:'approved', who:['Jordan Avery','JA','#7a5bd0'], action:'принял <b>3 новых снимка</b>', snap:'nav-header, empty-cart, promo-banner', p:'mobile-web', when:'16:22'},
      {t:'comment', who:['Тео Реймс','ТР','#c2683a'], action:'оставил комментарий', snap:'modal-confirm', p:'admin-dashboard', when:'14:05', cmt:'Тень модалки стала мягче — это намеренно, принимаем.'},
    ]],
  ];

  document.getElementById('feed').innerHTML = days.map(([day,evs])=>`
    <div class="daygroup">
      <div class="daylbl">${day}</div>
      <div class="feed">
        ${evs.map(e=>`
          <div class="ev">
            <div class="marker m-${e.t}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">${ic[e.t]}</svg></div>
            <div class="ec">
              <div class="erow">
                <div class="txt">${av(e.who[1],e.who[2])}<span class="who">${e.who[0]}</span> ${e.action}${e.snap?` · <span class="snaptag">${e.snap}</span>`:''}</div>
                <span class="when">${e.when}</span>
              </div>
              <div class="meta2">${e.p!=='—'?ptag(e.p):''}</div>
              ${e.cmt?`<div class="cmt">${e.cmt}</div>`:''}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
</script>
</body>
</html>
