<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pixela — Дерево тестов</title>
<link rel="stylesheet" href="styles.css">
<style>
  html,body{ height:100%; overflow:hidden; }
  .shell{ height:100vh; display:flex; background:var(--bg); }

  /* sidebar (compact) */
  .side{ width:60px; flex:0 0 60px; border-right:1px solid var(--border); background:var(--surface-1); display:flex; flex-direction:column; align-items:center; padding:12px 0; gap:6px; }
  .side .logo{ width:30px; height:30px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; margin-bottom:10px; }
  .side .logo svg{ width:18px; height:18px; color:var(--accent-fg); }
  .side a{ width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; color:var(--text-3); }
  .side a svg{ width:19px; height:19px; }
  .side a:hover{ background:var(--surface-2); color:var(--text-1); }
  .side a.active{ background:var(--accent-bg); color:var(--accent-2); }
  .side .sp{ flex:1; }
  .side .ava{ width:30px; height:30px; border-radius:50%; background:#5b6ee0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#fff; }

  /* tree column */
  .tree{ width:340px; flex:0 0 340px; border-right:1px solid var(--border); background:var(--surface-1); display:flex; flex-direction:column; }
  .tree .th{ padding:16px 16px 12px; border-bottom:1px solid var(--border); }
  .tree .th h2{ margin:0 0 12px; font-size:15px; font-weight:600; letter-spacing:-.01em; }
  .tree .search{ display:flex; align-items:center; gap:8px; height:32px; padding:0 11px; border-radius:7px; background:var(--surface-inset); border:1px solid var(--border); color:var(--text-3); font-size:13px; }
  .tree .search svg{ width:15px; height:15px; }
  .projsel{ display:flex; align-items:center; gap:8px; margin-top:10px; height:30px; padding:0 10px; border-radius:7px; background:var(--surface-2); border:1px solid var(--border); cursor:pointer; font-size:12.5px; color:var(--text-2); }
  .projsel svg{ width:14px; height:14px; } .projsel .br{ color:var(--text-1); font-weight:550; } .projsel .ch{ margin-left:auto; color:var(--text-3); }
  .treebody{ flex:1; overflow:auto; padding:8px 8px 24px; }

  .node{ }
  .nrow{ display:flex; align-items:center; gap:7px; height:30px; padding:0 8px; border-radius:6px; cursor:pointer; position:relative; }
  .nrow:hover{ background:var(--surface-2); }
  .nrow.sel{ background:var(--accent-bg); }
  .nrow.sel .nname{ color:var(--accent-2); }
  .chev{ width:14px; height:14px; flex:0 0 14px; color:var(--text-3); transition:transform .12s; display:flex; align-items:center; justify-content:center; }
  .chev.open{ transform:rotate(90deg); }
  .chev.leaf{ visibility:hidden; }
  .nicon{ width:15px; height:15px; flex:0 0 15px; color:var(--text-3); display:flex; align-items:center; justify-content:center; }
  .nicon svg{ width:15px; height:15px; }
  .nicon.spec{ color:#7da3e0; } .nicon.desc{ color:#c9a36b; } .nicon.test{ color:var(--text-2); } .nicon.snap{ color:#8a86c9; }
  .nname{ font-size:13px; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0; }
  .nrow.kspec .nname{ font-family:var(--mono); font-size:12.5px; font-weight:550; }
  .nrow.ktest .nname{ color:var(--text-2); }
  .sdot{ width:7px; height:7px; border-radius:50%; flex:0 0 7px; }
  .sdot.passed{ background:var(--ok); } .sdot.changed{ background:var(--changed); } .sdot.new{ background:var(--new); } .sdot.rejected{ background:var(--removed); }
  .ncount{ font-size:10.5px; font-family:var(--mono); color:var(--text-3); background:var(--surface-2); border-radius:5px; padding:1px 5px; }
  .children{ overflow:hidden; }

  /* detail */
  .detail{ flex:1; min-width:0; overflow:auto; display:flex; flex-direction:column; }
  .dtop{ padding:20px 26px 18px; border-bottom:1px solid var(--border); }
  .dpath{ display:flex; align-items:center; gap:7px; font-size:12px; color:var(--text-3); font-family:var(--mono); margin-bottom:11px; flex-wrap:wrap; }
  .dpath .seg2{ color:var(--text-2); } .dpath .sl{ color:var(--text-3); }
  .dtitle{ display:flex; align-items:center; gap:13px; }
  .dtitle h1{ margin:0; font-size:21px; font-weight:600; letter-spacing:-.02em; }
  .tags{ display:flex; gap:6px; margin-top:12px; }
  .tag{ font-family:var(--mono); font-size:11.5px; color:var(--accent-2); background:var(--accent-bg); border:1px solid rgba(110,138,250,0.25); border-radius:6px; padding:2px 8px; }
  .desc{ margin-top:14px; font-size:13.5px; color:var(--text-2); line-height:1.6; max-width:680px; }
  .desc .ann{ display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text-3); font-family:var(--mono); margin-bottom:6px; }

  .dgrid{ padding:20px 26px; display:grid; grid-template-columns:1fr 300px; gap:26px; align-items:start; }
  .dsec{ margin-bottom:22px; }
  .dsec h3{ margin:0 0 12px; font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-3); }
  .meta-line{ display:flex; align-items:center; justify-content:space-between; gap:14px; padding:7px 0; border-bottom:1px solid var(--border-faint); font-size:13px; }
  .meta-line:last-child{ border-bottom:0; }
  .meta-line .k{ color:var(--text-2); display:flex; align-items:center; gap:8px; } .meta-line .k svg{ width:14px; height:14px; color:var(--text-3); }
  .meta-line .v{ color:var(--text-1); font-weight:500; white-space:nowrap; } .meta-line .v.mono{ font-family:var(--mono); font-size:12.5px; }

  .matrix{ display:flex; flex-wrap:wrap; gap:8px; }
  .mchip{ display:flex; align-items:center; gap:7px; height:30px; padding:0 11px; border-radius:8px; background:var(--surface-2); border:1px solid var(--border); font-size:12.5px; color:var(--text-1); }
  .mchip svg.b{ width:14px; height:14px; }
  .mchip .st{ width:7px; height:7px; border-radius:50%; }
  .mchip .st.passed{ background:var(--ok); } .mchip .st.changed{ background:var(--changed); } .mchip .st.flaky{ background:var(--changed); }

  /* trend sparkbars */
  .spark{ display:flex; align-items:flex-end; gap:3px; height:64px; padding:10px 0 0; }
  .spark .bar{ flex:1; min-width:4px; border-radius:2px 2px 0 0; background:var(--ok); position:relative; opacity:.9; }
  .spark .bar.changed{ background:var(--changed); } .spark .bar.rejected{ background:var(--removed); } .spark .bar.new{ background:var(--new); }
  .spark-legend{ display:flex; justify-content:space-between; font-size:10.5px; color:var(--text-3); font-family:var(--mono); margin-top:6px; }

  /* baseline card */
  .basecard{ border:1px solid var(--border); border-radius:11px; overflow:hidden; background:var(--surface-1); }
  .basecard .bh{ display:flex; align-items:center; justify-content:space-between; padding:10px 13px; border-bottom:1px solid var(--border); }
  .basecard .bh .t{ font-size:12px; font-weight:600; color:var(--text-2); }
  .basecard .img{ height:300px; overflow:hidden; background:#0b0b0d; position:relative; }
  .basecard .img img{ width:100%; display:block; }
  .basecard .bf{ padding:10px 13px; display:flex; align-items:center; gap:9px; font-size:11.5px; color:var(--text-3); font-family:var(--mono); }

  .btn-hist{ width:100%; margin-top:12px; }
  .statusbig{ display:inline-flex; }
</style>
</head>
<body>
<div class="shell">
  <aside class="side">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5" fill="currentColor"/></svg></div>
    <a title="Сборки"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg></a>
    <a class="active" title="Тесты"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3v6l-5 9a2 2 0 0 0 2 3h12a2 2 0 0 0 2-3l-5-9V3"/><path d="M8 3h8M9.5 13h5"/></svg></a>
    <a title="Снимки"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg></a>
    <a title="Базовые линии"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></a>
    <div class="sp"></div>
    <a title="Настройки"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></a>
    <div class="ava">МК</div>
  </aside>

  <!-- TREE -->
  <div class="tree">
    <div class="th">
      <h2>Дерево тестов</h2>
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg> Найти тест или снимок…</div>
      <div class="projsel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/></svg> Проект <span class="br">Chromium · Desktop</span> <span class="ch"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"/></svg></span></div>
    </div>
    <div class="treebody" id="treebody"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail" id="detail"></div>
</div>

<script>
  const tree = [
    {type:'spec', name:'checkout-mobile.spec.ts', status:'changed', open:true, children:[
      {type:'desc', name:'Checkout flow', status:'changed', open:true, children:[
        {type:'desc', name:'Shipping step', status:'passed', open:false, children:[
          {type:'test', name:'renders shipping form', status:'passed', id:'t1'},
          {type:'test', name:'validates ZIP code', status:'passed', id:'t2'},
        ]},
        {type:'desc', name:'Payment step', status:'changed', open:true, children:[
          {type:'test', name:'renders order summary', status:'passed', id:'t3'},
          {type:'test', name:'applies promo code', status:'changed', id:'t4', sel:true, children:[
            {type:'snap', name:'promo-applied.png', status:'changed', id:'s4'},
          ]},
        ]},
      ]},
    ]},
    {type:'spec', name:'pricing.spec.ts', status:'changed', open:true, children:[
      {type:'desc', name:'Pricing table', status:'changed', open:false, children:[
        {type:'test', name:'renders pricing tiers', status:'changed', id:'t5'},
        {type:'test', name:'highlights popular plan', status:'passed', id:'t6'},
      ]},
    ]},
    {type:'spec', name:'nav.spec.ts', status:'passed', open:false, children:[
      {type:'desc', name:'Navigation', status:'passed', open:false, children:[
        {type:'test', name:'focus ring is visible', status:'passed', id:'t7'},
      ]},
    ]},
  ];

  const ICONS = {
    spec:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>',
    desc:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H7a2 2 0 0 0-2 2v4a2 2 0 0 1-2 2 2 2 0 0 1 2 2v4a2 2 0 0 0 2 2h1M16 3h1a2 2 0 0 1 2 2v4a2 2 0 0 0 2 2 2 2 0 0 0-2 2v4a2 2 0 0 1-2 2h-1"/></svg>',
    test:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3v6l-5 9a2 2 0 0 0 2 3h12a2 2 0 0 0 2-3l-5-9V3"/><path d="M8 3h8"/></svg>',
    snap:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>',
  };
  const chevSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m9 18 6-6-6-6"/></svg>';

  // detail content for tests
  const DETAILS = {
    t4:{
      path:['checkout-mobile.spec.ts','Checkout flow','Payment step'],
      title:'applies promo code', status:'changed', diff:'3.47%',
      tags:['@critical','@checkout','@mobile'],
      desc:'Промокод <b>SAVE10</b> применяется к итоговой сумме и отображается отдельной строкой в блоке «Order summary». Снимок фиксирует состояние корзины после успешного применения кода.',
      ann:'test.info().annotations · описание из describe()',
      loc:'checkout-mobile.spec.ts:84', owner:['Jordan Avery','JA','#5b6ee0'],
      snap:'promo-applied.png', viewport:'390 × 844', baselineAge:'12 дней', runs:'142', flaky:'4%',
      matrix:[['Chromium','passed'],['Firefox','passed'],['WebKit','passed'],['Mobile Safari','flaky']],
      base:'assets/new.png', updated:'8 минут назад',
      spark:[['p',8],['p',6],['p',7],['c',34],['p',9],['p',7],['p',6],['c',28],['r',40],['p',8],['p',7],['p',9],['p',6],['p',8],['c',22],['p',7],['p',9],['p',8],['c',47],['c',34]],
    },
  };
  // light placeholder details for the others
  ['t1','t2','t3','t5','t6','t7'].forEach((id,i)=>{
    const titles={t1:'renders shipping form',t2:'validates ZIP code',t3:'renders order summary',t5:'renders pricing tiers',t6:'highlights popular plan',t7:'focus ring is visible'};
    const st = (id==='t5')?'changed':'passed';
    DETAILS[id]={ path:['—'], title:titles[id], status:st, diff: st==='changed'?'5.10%':'0.00%', tags:['@regression'],
      desc:'Описание задаётся в Playwright через аннотацию <code>test.info()</code> и отображается здесь только для чтения.',
      ann:'аннотация Playwright', loc:'spec.ts', owner:['CI bot','CI','#3a3a44'], snap:titles[id].replace(/ /g,'-')+'.png',
      viewport:'390 × 844', baselineAge:'—', runs:'120', flaky:'1%',
      matrix:[['Chromium','passed'],['Firefox','passed'],['WebKit','passed']],
      base:'assets/baseline.png', updated:'—',
      spark:[['p',7],['p',6],['p',8],['p',7],['p',9],['p',6],['p',7],['p',8],['p',6],['p',7]].concat(st==='changed'?[['c',30],['p',8],['p',7],['c',24],['p',9]]:[['p',8],['p',7],['p',6],['p',9],['p',7]]) };
  });

  const statusBadge = (s,extra='')=>{
    const map={changed:['changed','Изменено','M12 9v4M12 17h.01|M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z'],
      passed:['passed','Без изменений','M20 6 9 17l-5-5'],
      new:['new','Новый','M12 5v14M5 12h14'], rejected:['rejected','Отклонён','M18 6 6 18M6 6l12 12']};
    const m=map[s]||map.passed; const paths=m[2].split('|').map(p=>`<path d="${p}"/>`).join('');
    return `<span class="status status--${m[0]}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">${paths}</svg> ${m[1]}${extra}</span>`;
  };
  const browserIcon = (n)=> ({
    'Chromium':'<svg class="b" viewBox="0 0 24 24" fill="none" stroke="#7da3e0" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/><path d="M12 9h9M5 7l4 6M15 18l-3-6"/></svg>',
    'Firefox':'<svg class="b" viewBox="0 0 24 24" fill="none" stroke="#e0954e" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M5 8c2-3 7-2 8 1"/></svg>',
    'WebKit':'<svg class="b" viewBox="0 0 24 24" fill="none" stroke="#5fb6c9" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="m8 16 4-8 4 8"/></svg>',
    'Mobile Safari':'<svg class="b" viewBox="0 0 24 24" fill="none" stroke="#9aa0ad" stroke-width="2"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg>',
  }[n]||'');

  let selected = 't4';

  function renderDetail(id){
    const d = DETAILS[id]; if(!d){ return; }
    const detail = document.getElementById('detail');
    const sparkH = d.spark.map(([t,v])=>{
      const cls = t==='c'?'changed':t==='r'?'rejected':t==='n'?'new':'';
      return `<div class="bar ${cls}" style="height:${Math.max(8,v)}%"></div>`;
    }).join('');
    const matrix = d.matrix.map(([b,s])=>`<div class="mchip">${browserIcon(b)} ${b} <span class="st ${s}"></span></div>`).join('');
    detail.innerHTML = `
      <div class="dtop">
        <div class="dpath">${d.path.map((p,i)=> i===0?`<span class="mono">${p}</span>`:`<span class="sl">›</span><span class="seg2">${p}</span>`).join('')}</div>
        <div class="dtitle"><h1>${d.title}</h1>${statusBadge(d.status, d.status==='changed'?` · ${d.diff}`:'')}</div>
        <div class="tags">${d.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        <div class="desc"><div class="ann"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 16v-4M12 8h.01"/><circle cx="12" cy="12" r="9"/></svg>${d.ann}</div>${d.desc}</div>
      </div>
      <div class="dgrid">
        <div>
          <div class="dsec">
            <h3>Свойства</h3>
            <div class="meta-line"><span class="k"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>Расположение</span><span class="v mono">${d.loc}</span></div>
            <div class="meta-line"><span class="k"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>Владелец</span><span class="v">${d.owner[0]}</span></div>
            <div class="meta-line"><span class="k"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/></svg>Снимок</span><span class="v mono">${d.snap}</span></div>
            <div class="meta-line"><span class="k"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/></svg>Вьюпорт</span><span class="v mono">${d.viewport}</span></div>
            <div class="meta-line"><span class="k"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Возраст базовой линии</span><span class="v">${d.baselineAge}</span></div>
          </div>
          <div class="dsec">
            <h3>Матрица браузеров</h3>
            <div class="matrix">${matrix}</div>
          </div>
          <div class="dsec">
            <h3>Тренд за 20 прогонов · нестабильность ${d.flaky}</h3>
            <div class="spark">${sparkH}</div>
            <div class="spark-legend"><span>20 прогонов назад</span><span>${d.runs} прогонов всего</span><span>сейчас</span></div>
          </div>
        </div>
        <div>
          <div class="basecard">
            <div class="bh"><span class="t">Текущая базовая линия</span><span class="mono" style="font-size:11px;color:var(--text-3)">${d.viewport}</span></div>
            <div class="img"><img src="${d.base}"></div>
            <div class="bf"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5"/></svg> обновлено ${d.updated}</div>
          </div>
          <a href="testhistory.html"><button class="btn btn--primary btn-hist"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg> Открыть историю теста</button></a>
        </div>
      </div>`;
  }

  function renderTree(){
    const root = document.getElementById('treebody');
    root.innerHTML = '';
    const walk = (nodes, depth)=>{
      nodes.forEach(n=>{
        const row = document.createElement('div');
        const kind = 'k'+n.type;
        row.className = 'nrow '+kind + (n.id===selected?' sel':'');
        row.style.paddingLeft = (8+depth*16)+'px';
        const hasKids = n.children && n.children.length;
        const chev = hasKids ? `<span class="chev ${n.open?'open':''}">${chevSvg}</span>` : `<span class="chev leaf"></span>`;
        const dot = `<span class="sdot ${n.status}"></span>`;
        const count = (hasKids && n.type!=='test') ? `<span class="ncount">${countTests(n)}</span>` : '';
        row.innerHTML = `${chev}<span class="nicon ${n.type}">${ICONS[n.type]}</span><span class="nname">${n.name}</span>${dot}${count}`;
        row.addEventListener('click',()=>{
          if(hasKids){ n.open=!n.open; }
          if(n.id){ selected=n.id; renderDetail(n.id); }
          renderTree();
        });
        root.appendChild(row);
        if(hasKids && n.open) walk(n.children, depth+1);
      });
    };
    walk(tree, 0);
  }
  function countTests(n){ let c=0; (function w(x){ (x.children||[]).forEach(ch=>{ if(ch.type==='test') c++; w(ch); }); })(n); return c; }

  renderTree();
  renderDetail('t4');
</script>
</body>
</html>
