<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Pixela — Проекты</title>
<link rel="stylesheet" href="styles.css">
<style>
  html,body{ height:100%; overflow:hidden; }
  .shell{ height:100vh; display:flex; background:var(--bg); }

  /* ---- org sidebar (shared across org-level screens) ---- */
  .side{ width:228px; flex:0 0 228px; border-right:1px solid var(--border); background:var(--surface-1); display:flex; flex-direction:column; }
  .side .brand{ height:52px; display:flex; align-items:center; gap:9px; padding:0 16px; border-bottom:1px solid var(--border); }
  .logo{ width:22px; height:22px; border-radius:6px; background:var(--accent); display:flex; align-items:center; justify-content:center; }
  .logo svg{ width:14px; height:14px; color:var(--accent-fg); }
  .brand .name{ font-weight:600; font-size:15px; letter-spacing:-.01em; }
  .orgsel{ margin:12px 12px 6px; padding:9px 11px; border-radius:8px; background:var(--surface-2); border:1px solid var(--border); display:flex; align-items:center; gap:10px; cursor:pointer; }
  .orgsel:hover{ background:var(--surface-3); }
  .orgsel .av{ width:24px; height:24px; border-radius:6px; background:linear-gradient(135deg,#6E8AFA,#9d7bf0); flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; }
  .orgsel .t{ flex:1; min-width:0; } .orgsel .t .o{ font-size:13px; font-weight:600; } .orgsel .t .p{ font-size:11px; color:var(--text-3); }
  .orgsel .ch{ color:var(--text-3); } .orgsel .ch svg{ width:14px; height:14px; }
  .nav{ padding:8px 12px; display:flex; flex-direction:column; gap:2px; }
  .nav .lbl{ font-size:10.5px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--text-3); padding:10px 10px 6px; }
  .nav a{ display:flex; align-items:center; gap:11px; height:34px; padding:0 10px; border-radius:7px; color:var(--text-2); font-size:13px; font-weight:500; text-decoration:none; }
  .nav a svg{ width:16px; height:16px; } .nav a .ct{ margin-left:auto; font-size:11px; font-family:var(--mono); color:var(--text-3); background:var(--surface-2); border-radius:5px; padding:1px 6px; }
  .nav a:hover{ background:var(--surface-2); color:var(--text-1); text-decoration:none; }
  .nav a.active{ background:var(--accent-bg); color:var(--accent-2); } .nav a.active .ct{ color:var(--accent-2); background:rgba(110,138,250,0.16); }
  .side .foot{ margin-top:auto; padding:10px 12px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px; }
  .side .foot .ava{ width:28px; height:28px; border-radius:50%; background:#5b6ee0; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; color:#fff; }
  .side .foot .un{ font-size:13px; font-weight:550; } .side .foot .ue{ font-size:11px; color:var(--text-3); }
  .side .foot .cog{ margin-left:auto; color:var(--text-3); cursor:pointer; } .side .foot .cog svg{ width:16px; height:16px; }

  /* ---- main ---- */
  .main{ flex:1; min-width:0; display:flex; flex-direction:column; }
  .topbar{ height:58px; flex:0 0 58px; display:flex; align-items:center; gap:14px; padding:0 26px; border-bottom:1px solid var(--border); }
  .topbar h1{ margin:0; font-size:18px; font-weight:600; letter-spacing:-.01em; }
  .topbar .spacer{ flex:1; }
  .search{ display:flex; align-items:center; gap:8px; height:34px; padding:0 12px; border-radius:8px; background:var(--surface-inset); border:1px solid var(--border); width:240px; color:var(--text-3); font-size:13px; }
  .search svg{ width:15px; height:15px; }

  .body{ flex:1; overflow:auto; padding:22px 26px 44px; }

  /* summary strip */
  .summary{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
  .scard{ border:1px solid var(--border); border-radius:12px; background:var(--surface-1); padding:15px 17px; }
  .scard .lab{ font-size:11.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:.04em; display:flex; align-items:center; gap:7px; margin-bottom:10px; }
  .scard .lab svg{ width:14px; height:14px; }
  .scard .num{ font-family:var(--mono); font-size:25px; font-weight:600; letter-spacing:-.02em; }
  .scard .sub{ font-size:11.5px; color:var(--text-3); margin-top:4px; }
  .scard.amber .num{ color:var(--changed); } .scard.blue .num{ color:var(--accent-2); }

  .secrow{ display:flex; align-items:center; justify-content:space-between; margin:4px 0 14px; }
  .secrow h2{ margin:0; font-size:14px; font-weight:600; }
  .seg-sm{ display:inline-flex; background:var(--surface-inset); border:1px solid var(--border); border-radius:7px; padding:2px; gap:2px; }
  .seg-sm button{ height:26px; padding:0 11px; border:0; border-radius:5px; font-family:var(--font); font-size:12.5px; font-weight:550; color:var(--text-2); background:transparent; cursor:pointer; }
  .seg-sm button[aria-pressed=true]{ background:var(--surface-3); color:var(--text-1); }

  /* project cards */
  .projects{ display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  .pcard{ border:1px solid var(--border); border-radius:13px; background:var(--surface-1); padding:17px 18px 15px; cursor:pointer; transition:border-color .12s,transform .12s; display:flex; flex-direction:column; gap:14px; }
  .pcard:hover{ border-color:var(--border-strong); transform:translateY(-2px); }
  .pcard .ph{ display:flex; align-items:flex-start; gap:12px; }
  .pcard .repo{ width:36px; height:36px; border-radius:9px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; color:#fff; }
  .pcard .repo svg{ width:18px; height:18px; }
  .pcard .pn{ flex:1; min-width:0; }
  .pcard .pn .nm{ font-size:14.5px; font-weight:600; letter-spacing:-.01em; display:flex; align-items:center; gap:7px; }
  .pcard .pn .rp{ font-size:12px; color:var(--text-3); font-family:var(--mono); margin-top:2px; display:flex; align-items:center; gap:6px; }
  .pcard .pn .rp svg{ width:12px; height:12px; }

  .health{ display:flex; flex-direction:column; gap:8px; }
  .health .hl{ display:flex; align-items:center; justify-content:space-between; font-size:12px; }
  .health .hl .k{ color:var(--text-2); } .health .hl .v{ font-family:var(--mono); color:var(--text-1); }
  .health .bar{ height:6px; border-radius:3px; background:var(--surface-3); overflow:hidden; display:flex; }
  .health .bar i{ height:100%; display:block; }
  .health .bar .ok{ background:var(--ok); } .health .bar .ch{ background:var(--changed); } .health .bar .rm{ background:var(--removed); }

  .spark{ display:flex; align-items:flex-end; gap:2px; height:30px; }
  .spark i{ flex:1; min-width:2px; border-radius:1.5px 1.5px 0 0; background:var(--ok); opacity:.85; }
  .spark i.c{ background:var(--changed); } .spark i.r{ background:var(--removed); }

  .pfoot{ display:flex; align-items:center; gap:10px; padding-top:13px; border-top:1px solid var(--border-faint); }
  .avstack{ display:flex; } .avstack .ava{ width:22px; height:22px; border-radius:50%; border:2px solid var(--surface-1); margin-left:-6px; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:600; color:#fff; }
  .avstack .ava:first-child{ margin-left:0; }
  .pfoot .when{ margin-left:auto; font-size:11.5px; color:var(--text-3); font-family:var(--mono); display:flex; align-items:center; gap:6px; }
  .pfoot .when svg{ width:12px; height:12px; }
  .openreviews{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; color:var(--changed); background:var(--changed-bg); border:1px solid rgba(224,165,62,.25); border-radius:6px; padding:2px 8px; }
  .openreviews svg{ width:12px; height:12px; }
  .clean{ display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; color:var(--ok); background:var(--ok-bg); border:1px solid rgba(79,181,138,.25); border-radius:6px; padding:2px 8px; }
  .clean svg{ width:12px; height:12px; }
  .paused{ color:var(--text-3); background:var(--neutral-bg); border-color:var(--border); }
</style>
</head>
<body>
<div class="shell">
  <aside class="side" id="orgside"></aside>

  <main class="main">
    <div class="topbar">
      <h1>Проекты</h1>
      <div class="spacer"></div>
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg> Найти репозиторий…</div>
      <button class="btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Подключить репозиторий</button>
    </div>

    <div class="body">
      <div class="summary">
        <div class="scard"><div class="lab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>Проектов</div><div class="num">6</div><div class="sub">5 активных · 1 на паузе</div></div>
        <div class="scard"><div class="lab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>Снимков отслеживается</div><div class="num">2 847</div><div class="sub">+124 за неделю</div></div>
        <div class="scard amber"><div class="lab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>Открытых проверок</div><div class="num">14</div><div class="sub">в 3 проектах</div></div>
        <div class="scard amber"><div class="lab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>Нестабильных тестов</div><div class="num">23</div><div class="sub">помечены за 30 дней</div></div>
      </div>

      <div class="secrow">
        <h2>Все проекты</h2>
        <div class="seg-sm"><button aria-pressed="true">Сетка</button><button aria-pressed="false">Список</button></div>
      </div>
      <div class="projects" id="projects"></div>
    </div>
  </main>
</div>

<script src="org-shell.js"></script>
<script>
  renderOrgSide('projects');
  const projects = [
    {name:'Storefront', repo:'acme/storefront', color:'linear-gradient(135deg,#6E8AFA,#9d7bf0)', status:'review',
      ok:472, ch:21, rm:3, total:496, open:12, flaky:4, when:'8 мин',
      team:[['JA','#5b6ee0'],['МК','#5b6ee0'],['ТР','#c2683a'],['АЛ','#3a8f6b']],
      spark:'p,p,p,c,p,p,p,c,r,p,p,p,p,p,c,p,p,p,c,c'},
    {name:'Admin Dashboard', repo:'acme/admin-dashboard', color:'linear-gradient(135deg,#56A8D6,#6E8AFA)', status:'review',
      ok:308, ch:8, rm:0, total:316, open:1, flaky:2, when:'34 мин',
      team:[['ТР','#c2683a'],['МК','#5b6ee0']],
      spark:'p,p,p,p,p,p,c,p,p,p,p,p,p,p,p,c,p,p,p,c'},
    {name:'Marketing Site', repo:'acme/marketing-site', color:'linear-gradient(135deg,#4FB58A,#56A8D6)', status:'clean',
      ok:184, ch:0, rm:0, total:184, open:0, flaky:0, when:'2 ч',
      team:[['АЛ','#3a8f6b'],['JA','#5b6ee0']],
      spark:'p,p,p,p,p,p,p,p,p,p,p,p,p,p,p,p,p,p,p,p'},
    {name:'Design System', repo:'acme/design-system', color:'linear-gradient(135deg,#9d7bf0,#E0A53E)', status:'review',
      ok:611, ch:14, rm:1, total:626, open:1, flaky:7, when:'5 ч',
      team:[['МК','#5b6ee0'],['ТР','#c2683a'],['АЛ','#3a8f6b'],['JA','#5b6ee0'],['+2','#3a3a44']],
      spark:'p,c,p,p,p,p,p,c,p,p,p,p,c,p,p,p,p,p,p,c'},
    {name:'Mobile Web', repo:'acme/mobile-web', color:'linear-gradient(135deg,#E0A53E,#E06A52)', status:'clean',
      ok:412, ch:0, rm:0, total:412, open:0, flaky:3, when:'1 дн',
      team:[['JA','#5b6ee0'],['АЛ','#3a8f6b']],
      spark:'p,p,p,p,p,c,p,p,p,p,p,p,p,p,p,p,p,p,p,p'},
    {name:'Docs Portal', repo:'acme/docs', color:'linear-gradient(135deg,#3a3a44,#5b6ee0)', status:'paused',
      ok:286, ch:0, rm:0, total:298, open:0, flaky:0, when:'12 дн',
      team:[['АЛ','#3a8f6b']],
      spark:'p,p,p,p,p,p,p,p,p,p,p,p,p,p,p,p,p,p,p,p'},
  ];

  const repoIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v16l-4-3-4 3-4-3-4 3z" transform="scale(0)"/><path d="M6 3h11a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1 0-4h13"/><path d="M6 17V3"/></svg>';
  function statusTag(p){
    if(p.status==='clean') return `<span class="clean"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg> Всё в норме</span>`;
    if(p.status==='paused') return `<span class="openreviews paused"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg> На паузе</span>`;
    return `<span class="openreviews"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg> ${p.open} на проверке</span>`;
  }
  function sparkBars(s){ return s.split(',').map(t=>{ const h=8+Math.round(Math.random()*16)+(t!=='p'?14:0); const cls=t==='c'?'c':t==='r'?'r':''; return `<i class="${cls}" style="height:${Math.min(30,h)}px"></i>`; }).join(''); }

  document.getElementById('projects').innerHTML = projects.map(p=>{
    const okW=(p.ok/p.total*100), chW=(p.ch/p.total*100), rmW=(p.rm/p.total*100);
    const pct=(p.ok/p.total*100).toFixed(1);
    const avs = p.team.map(t=>`<span class="ava" style="background:${t[1]}">${t[0]}</span>`).join('');
    return `<div class="pcard" onclick="location.href='buildlist.html'">
      <div class="ph">
        <span class="repo" style="background:${p.color}">${repoIcon}</span>
        <div class="pn">
          <div class="nm">${p.name}</div>
          <div class="rp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.9a3.4 3.4 0 0 0-.9-2.6c3-.3 6.2-1.5 6.2-6.7A5.2 5.2 0 0 0 19 4.8 4.9 4.9 0 0 0 18.9 1S17.7.6 15 2.5a13 13 0 0 0-7 0C5.3.6 4.1 1 4.1 1A4.9 4.9 0 0 0 4 4.8a5.2 5.2 0 0 0-1.4 3.6c0 5.2 3.2 6.4 6.2 6.7a3.4 3.4 0 0 0-.9 2.6V22"/></svg>${p.repo}</div>
        </div>
        ${statusTag(p)}
      </div>
      <div class="health">
        <div class="hl"><span class="k">Снимки в норме</span><span class="v">${p.ok} / ${p.total} · ${pct}%</span></div>
        <div class="bar"><i class="ok" style="width:${okW}%"></i><i class="ch" style="width:${chW}%"></i><i class="rm" style="width:${rmW}%"></i></div>
      </div>
      <div class="spark">${sparkBars(p.spark)}</div>
      <div class="pfoot">
        <div class="avstack">${avs}</div>
        ${p.flaky?`<span style="font-size:11.5px;color:var(--text-3)">${p.flaky} нестаб.</span>`:''}
        <span class="when"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>${p.when}</span>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.seg-sm button').forEach(b=> b.addEventListener('click',()=>{ document.querySelectorAll('.seg-sm button').forEach(x=>x.setAttribute('aria-pressed', x===b)); }));
</script>
</body>
</html>
