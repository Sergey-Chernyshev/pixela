version: "2"
sql:
  - engine: "postgresql"
    schema: "db/schema.sql"
    queries: "internal/db/sqlc/query"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_all_enum_values: true
        emit_interface: false
