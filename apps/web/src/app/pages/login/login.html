<div class="wrap">
  <div class="card">
    <div class="mark">
      <span class="logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
          <rect x="3" y="3" width="8" height="8" rx="1.5" />
          <rect x="13" y="3" width="8" height="8" rx="1.5" />
          <rect x="3" y="13" width="8" height="8" rx="1.5" />
          <rect x="13" y="13" width="8" height="8" rx="1.5" fill="currentColor" />
        </svg>
      </span>
      <div style="text-align: center"><div class="wm">Pixela</div></div>
    </div>

    <div class="panel">
      <h1>Вход в рабочее пространство</h1>
      <p class="hint">Визуальное регрессионное тестирование для вашей команды</p>

      <div class="sso">
        <button type="button" class="ssobtn" disabled title="Скоро">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.09.66-.22.66-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.46-1.11-1.46-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02a9.6 9.6 0 0 1 5 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.85v2.74c0 .27.16.58.67.48A10 10 0 0 0 22 12c0-5.52-4.48-10-10-10z"
            />
          </svg>
          Продолжить с GitHub
        </button>
        <button type="button" class="ssobtn" disabled title="Скоро">
          <svg viewBox="0 0 24 24">
            <path
              fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"
            />
            <path
              fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"
            />
            <path
              fill="#FBBC05"
              d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.07H2.18a11 11 0 0 0 0 9.86l3.66-2.84z"
            />
            <path
              fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"
            />
          </svg>
          Продолжить с Google
        </button>
        <button type="button" class="ssobtn" disabled title="Скоро">
          <svg viewBox="0 0 24 24">
            <path
              fill="#FC6D26"
              d="m23.6 9.6-.03-.08-3.26-8.5a.85.85 0 0 0-.84-.54.85.85 0 0 0-.8.62l-2.2 6.74H7.53L5.33 1.1a.85.85 0 0 0-.8-.62.85.85 0 0 0-.84.55L.43 9.52l-.03.08a6.05 6.05 0 0 0 2.01 6.99l.01.01.03.02 4.96 3.72 2.46 1.86 1.5 1.13a1 1 0 0 0 1.2 0l1.5-1.13 2.46-1.86 5-3.74.01-.01a6.05 6.05 0 0 0 2.06-6.99z"
            />
          </svg>
          Продолжить с GitLab
        </button>
      </div>

      <div class="or">или по почте</div>

      <form (ngSubmit)="submit()">
        <div class="field">
          <label for="email">Рабочая почта</label>
          <input
            id="email"
            name="email"
            type="email"
            placeholder="you@acme.dev"
            autocomplete="email"
            [(ngModel)]="email"
            [disabled]="loading()"
          />
        </div>
        <div class="field">
          <label for="password">Пароль</label>
          <input
            id="password"
            name="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            [(ngModel)]="password"
            [disabled]="loading()"
          />
        </div>

        @if (error()) {
          <div class="err">{{ error() }}</div>
        }

        <button type="submit" class="submit" [disabled]="loading() || !email || !password">
          @if (loading()) {
            <svg
              class="spin"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M21 12a9 9 0 1 1-6.2-8.5" />
            </svg>
            Вход…
          } @else {
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="m22 6-10 7L2 6" />
              <rect x="2" y="4" width="20" height="16" rx="2" />
            </svg>
            Войти
          }
        </button>
      </form>

      <div class="foot">Нет аккаунта? обратитесь к администратору пространства</div>
    </div>

    <div class="legal">Self-hosted · Pixela</div>
  </div>
</div>
