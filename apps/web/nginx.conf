# nginx serves the built Angular SPA and reverse-proxies /api to the Go backend, so the browser sees a
# single origin (no CORS, first-party session cookie). Presigned image URLs point straight at MinIO's
# published host (S3_PUBLIC_ENDPOINT) and do NOT go through here.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # API → Go backend. No trailing slash on proxy_pass keeps the /api prefix, which the backend mounts.
  location /api/ {
    proxy_pass http://api:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # Long-cache hashed build assets.
  location /assets/ {
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public, immutable";
  }

  # SPA fallback: every other path serves index.html so client-side routing works on reload.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
