# Dev infrastructure only (postgres + redis + minio).
# The API/worker run from the host with hot-reload (`pnpm dev:api`).
# Mirrors docs/spec/infra/docker-compose.md.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pixela
      POSTGRES_PASSWORD: pixela
      POSTGRES_DB: pixela
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pixela']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pixela
      MINIO_ROOT_PASSWORD: pixela-secret
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/ready']
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  miniodata:
