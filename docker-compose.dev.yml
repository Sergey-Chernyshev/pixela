# Dev infrastructure only (postgres + redis + minio).
# The Go API/worker run from the host with hot-reload (`task -d apps/api dev`).
# Mirrors docs/spec/infra/docker-compose.md and docs/architecture/go-backend.md.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pixela
      POSTGRES_PASSWORD: pixela
      POSTGRES_DB: pixela
    ports:
      # Host port is overridable (defaults to the spec value) so Pixela can run alongside
      # other local stacks without conflicts. Override in .env if 5432 is taken.
      - '${PIXELA_PG_PORT:-5432}:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pixela']
      interval: 5s
      timeout: 3s
      retries: 10

  # Redis is for dashboard SESSIONS ONLY (decision B-03 / go-backend.md §1.1).
  # The job queue moved to Postgres (River) — Redis is out of the data/queue path.
  redis:
    image: redis:7
    ports:
      - '${PIXELA_REDIS_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: pixela
      MINIO_ROOT_PASSWORD: pixela-secret
    ports:
      - '${PIXELA_MINIO_PORT:-9000}:9000'
      - '${PIXELA_MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/ready']
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Prod-parity reference (NOT started in dev) ───────────────────────────────
  # In dev the API/worker run from the host. In prod the SAME image runs in two
  # modes, selected by `command:` (ENTRYPOINT is the binary — see apps/api/Dockerfile).
  # A one-shot `migrate` runs Atlas migrations before `serve`/`worker` come up.
  # Uncomment + point at a built/pushed image to bring the whole stack up locally.
  #
  # api:
  #   image: pixela:latest          # build: { context: ./apps/api }
  #   command: ["serve"]            # → pixela serve  (chi + Huma HTTP API)
  #   environment:
  #     DATABASE_URL: postgresql://pixela:pixela@postgres:5432/pixela
  #     REDIS_URL: redis://redis:6379          # sessions only
  #     S3_ENDPOINT: http://minio:9000
  #   ports:
  #     - '${PIXELA_API_PORT:-3000}:3000'
  #   depends_on:
  #     postgres: { condition: service_healthy }
  #     redis: { condition: service_healthy }
  #     minio: { condition: service_healthy }
  #   healthcheck:
  #     test: ['CMD', '/pixela', 'healthcheck']   # or wire an external probe to /readyz
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5
  #
  # worker:
  #   image: pixela:latest
  #   command: ["worker"]           # → pixela worker  (River diff/finalize workers)
  #   environment:
  #     DATABASE_URL: postgresql://pixela:pixela@postgres:5432/pixela
  #     REDIS_URL: redis://redis:6379
  #     S3_ENDPOINT: http://minio:9000
  #   depends_on:
  #     postgres: { condition: service_healthy }
  #     minio: { condition: service_healthy }
  #   # Scale diff throughput horizontally: `docker compose up --scale worker=N`.

volumes:
  pgdata:
  miniodata:
